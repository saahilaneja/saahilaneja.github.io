<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saahil/index</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('assets/websiteDesign.png') no-repeat center center fixed;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: #fff;
            font-family: 'Single Day', monospace;
        }

        nav {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: inline-block;
        }

        nav li {
            display: inline;
            margin-right: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-size: 2.0em;
            font-family: 'Single Day', monospace;
            transition: color 0.3s ease-in-out;
        }

        #header {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            color: #fff;
            font-family: 'Single Day', monospace;
            text-shadow: 4px 4px 6px rgba(0, 0, 0, 0.9);
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }

        #header, nav {
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .contact-button {
            position: relative;
            top: 400px;
            left: 400px;
            overflow: hidden;
        }

        .contact-button a {
            display: block;
            position: relative;
             margin: 0;
            padding: 0;
        }

        .contact-button img {
            max-width: 100%;
            height: auto;
            transition: transform 0.3s ease-in-out;
            display: block;
        }

        .contact-button img.hovered {
            transform: scale(0);
        }

        .contact-button:hover img.default {
            transform: scale(0);
        }

        .contact-button:hover img.hovered {
            transform: scale(1);
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Single+Day&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div id="header">
        <h1>Computer Science Student at Purdue University</h1>
    </div>

    <div class="contact-button">
        <a href="contact.html" style="text-decoration: none; color: inherit;">
            <img src="assets/cbutton.png" alt="Contact Button" class="default">
            <img src="assets/contactHover.png" alt="Contact Hovered" class="hovered">
        </a>
    </div>

    <script src="https://unpkg.com/scrollreveal"></script>
    
    <script>
        ScrollReveal().reveal('#header', { delay: 100 });
    </script>
</body>
</html>
