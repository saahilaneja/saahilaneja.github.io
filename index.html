<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saahil/index</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('saahilaneja.github.io/assets/webbg2.png') no-repeat center center fixed;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: #fff;
            font-family: 'Single Day', monospace;
        }

        canvas {
            display: block;
        }

        nav {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: inline-block;
        }

        nav li {
            display: inline;
            margin-right: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-size: 2.0em;
            font-family: 'Single Day', monospace;
            transition: color 0.3s ease-in-out;
        }

        #header, nav {
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        h1 {
            font-size: 3em;
            margin: 10px 0;
            font-family: 'Single Day', monospace;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        p {
            font-size: 1.5em;
            margin: 10px 0;
            font-family: 'Single Day', monospace;
        }

        h1::after {
            content: "|";
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Single+Day&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div id="header">
        <h1>Computer Science Student at Purdue University</h1>
    </div>

    <script>
    </script>
    
    <script src="https://unpkg.com/scrollreveal"></script>
    
    <script>
        ScrollReveal().reveal('#header', { delay: 500 });
    </script>
</body>
</html>
