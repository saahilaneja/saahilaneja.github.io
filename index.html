<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>saahil/index</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: url('saahilaneja.github.io/assets/webbg2.png') no-repeat center center fixed;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: #fff;
            font-family: 'Single Day', monospace;
        }

        nav {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            text-align: center;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: inline-block;
        }

        nav li {
            display: inline;
            margin-right: 20px;
        }

        nav a {
            text-decoration: none;
            color: #fff;
            font-size: 2.0em;
            font-family: 'Single Day', monospace;
            transition: color 0.3s ease-in-out;
        }

        #header {
            position: absolute;
            top: 80%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            color: #fff;
            font-family: 'Single Day', monospace;
            text-shadow: 4px 4px 6px rgba(0, 0, 0, 0.9);
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }

        #header, nav {
            opacity: 0;
            animation: fadeIn 2s ease-in-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .contact-button {
            position: absolute;
            top: 200px;
            left: 200px;
            overflow: hidden;
        }

        .contact-button a {
            display: block;
            position: relative;
            margin: 0;
            padding: 0;
        }

        .contact-button img {
            max-width: 100%;
            height: auto;
            display: block;
            mask: url(#contact-mask);
            mask-mode: alpha;
            transition: opacity 0.3s ease-in-out;
        }

        .contact-button::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #362370; /* Set the overlay color */
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
            mask: url(#contact-mask);
            mask-mode: alpha;
        }

        .contact-button:hover::after {
            opacity: 1;
        }

        .contact-button:hover img {
            opacity: 0;
        }
    </style>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Single+Day&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap">
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <div id="header">
        <h1>Computer Science Student at Purdue University</h1>
    </div>

    <div class="contact-button">
        <a href="contact.html" style="text-decoration: none; color: inherit;">
            <img src="saahilaneja.github.io/assets/contactButton.png" alt="Contact Button">
        </a>
    </div>

    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <mask id="contact-mask" maskContentUnits="objectBoundingBox">
                <circle cx="0.5" cy="0.5" r="0.4" fill="white"/>
            </mask>
        </defs>
    </svg>

    <script src="https://unpkg.com/scrollreveal"></script>
    
    <script>
        ScrollReveal().reveal('#header', { delay: 100 });
    </script>
</body>
</html>
